<!DOCTYPE html>
<html>
<head>
<title>Please Forgive Me Jay ❤️</title>

<style>
body{
    text-align:center;
    font-family:Arial;
    background:#ffe6e6;
}

h1{
    margin-top:100px;
}

button{
    padding:15px 30px;
    font-size:18px;
    margin:20px;
    cursor:pointer;
}

#noBtn{
    position:absolute;
}

.heart{
    position:fixed;
    font-size:30px;
    animation:float 2s linear;
}

@keyframes float{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-200px);
        opacity:0;
    }
}
</style>
</head>

<body>

<h1>I’m really sorry 😔</h1>
<p>Please forgive me?</p>

<button onclick="forgive()" id="yesBtn">Yes ❤️</button>
<button onmouseover="runAway()" id="noBtn">No</button>

<script>

// runaway NO button
function runAway(){
    const btn = document.getElementById("noBtn");

    const x = Math.random()*window.innerWidth;
    const y = Math.random()*window.innerHeight;

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

// hearts animation
function forgive(){

    for(let i=0;i<30;i++){

        let heart=document.createElement("div");
        heart.innerHTML="❤️";
        heart.className="heart";

        heart.style.left=Math.random()*window.innerWidth+"px";
        heart.style.top=Math.random()*window.innerHeight+"px";

        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),2000);
    }

    alert("Thank you for forgiving me ❤️");

    // send email
    fetch("https://formsubmit.co/laronamasondo@gmail.com",{
        method:"POST",
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            message:"Someone forgave you!"
        })
    });

}

</script>

</body>
</html>
